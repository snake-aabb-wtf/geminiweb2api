<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>账号管理 — Gemini2API</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
nav a { color: #8b949e; text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 4px; }
nav a:hover { color: #58a6ff; background: #1c2128; }
nav .brand { color: #f0f6fc; font-size: 18px; font-weight: 700; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
h2 { margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
th { background: #1c2128; padding: 12px 16px; text-align: left; font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; }
td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 14px; }
tr:hover { background: #1c2128; }
button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
button:hover { background: #30363d; border-color: #8b949e; }
.back { display: inline-block; margin-bottom: 16px; color: #58a6ff; text-decoration: none; font-size: 14px; }
.back:hover { text-decoration: underline; }
</style>
</head>
<body>
<nav>
  <span class="brand">✨ Gemini2API</span>
  <a href="/">仪表盘</a>
  <a href="/webui/accounts">账号管理</a>
</nav>
<div class="container">
  <a class="back" href="/">← 返回仪表盘</a>
  <h2>账号管理</h2>
  <table>
    <thead><tr><th>账号</th><th>错误数</th><th>绑定模型</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>
      {{accounts_table}}
    </tbody>
  </table>
</div>
</body>
</html>
