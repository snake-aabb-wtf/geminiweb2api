<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gemini2API 管理面板</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
nav a { color: #8b949e; text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 4px; }
nav a:hover { color: #58a6ff; background: #1c2128; }
nav .brand { color: #f0f6fc; font-size: 18px; font-weight: 700; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.card h3 { color: #8b949e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card .value { font-size: 32px; font-weight: 700; color: #f0f6fc; }
.card .value.green { color: #3fb950; }
.card .value.red { color: #f85149; }
.card .value.yellow { color: #d29922; }
table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
th { background: #1c2128; padding: 12px 16px; text-align: left; font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; }
td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 14px; }
tr:hover { background: #1c2128; }
button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 13px; }
button:hover { background: #30363d; border-color: #8b949e; }
.info { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<nav>
  <span class="brand">✨ Gemini2API</span>
  <a href="/">仪表盘</a>
  <a href="/webui/accounts">账号管理</a>
</nav>
<div class="container" id="main-content">
  <div class="cards">
    <div class="card"><h3>总请求</h3><div class="value">{{total_requests}}</div></div>
    <div class="card"><h3>成功</h3><div class="value green">{{success}}</div></div>
    <div class="card"><h3>失败</h3><div class="value red">{{failures}}</div></div>
    <div class="card"><h3>重试</h3><div class="value yellow">{{retries}}</div></div>
    <div class="card"><h3>账号总数</h3><div class="value">{{accounts_total}}</div></div>
    <div class="card"><h3>可用</h3><div class="value green">{{accounts_enabled}}</div></div>
    <div class="card"><h3>禁用</h3><div class="value red">{{accounts_disabled}}</div></div>
    <div class="card"><h3>已耗尽</h3><div class="value red">{{accounts_exhausted}}</div></div>
  </div>
  <div class="info">
    默认模型: <b>{{default_model}}</b> &middot;
    轮询策略: <b>{{strategy}}</b> &middot;
    可用 Profile: <b>{{profiles}}</b>
  </div>
</div>
</body>
</html>
