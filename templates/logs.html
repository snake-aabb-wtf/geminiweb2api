<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实时日志 — Gemini2API</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">✨ Gemini2API</span>
  <a href="/">仪表盘</a>
  <a href="/webui/accounts">账号管理</a>
  <a href="/webui/logs" class="active">实时日志</a>
  <span style="margin-left:auto" class="tag">v{{version}}</span>
  <a class="btn" href="/api/auth/logout" style="margin-left:8px">登出</a>
</nav>
<div class="container">
  <a class="back" href="/">← 返回仪表盘</a>
  <div class="flex-row" style="margin-bottom:12px">
    <h2 style="margin:0;flex:1">实时日志</h2>
    <label class="flex-row" style="margin:0;gap:6px">
      <input type="checkbox" id="autoscroll" checked style="width:auto"> 自动滚动
    </label>
    <button onclick="clearLog()">清屏</button>
    <button onclick="reconnect()">重连</button>
  </div>
  <div class="log-stream" id="log-stream">
    <div class="line">等待连接 /api/events/stream…</div>
  </div>
</div>
<script>
const stream = document.getElementById("log-stream");
const autoscroll = document.getElementById("autoscroll");
let es = null;
function append(line) {
  const div = document.createElement("div");
  div.className = "line " + (line.level || "INFO");
  div.textContent = `[${line.ts || new Date().toISOString()}] ${line.level} ${line.logger} - ${line.message}`;
  stream.appendChild(div);
  if (stream.childElementCount > 500) stream.firstElementChild.remove();
  if (autoscroll.checked) stream.scrollTop = stream.scrollHeight;
}
function clearLog() { stream.innerHTML = ""; }
function reconnect() { if (es) es.close(); connect(); }
function connect() {
  es = new EventSource("/api/events/stream");
  es.addEventListener("log", (ev) => {
    try { append(JSON.parse(ev.data)); } catch (e) { /* ignore */ }
  });
  es.onerror = () => {
    const div = document.createElement("div");
    div.className = "line ERROR";
    div.textContent = "[连接断开,5 秒后重试]";
    stream.appendChild(div);
    es.close();
    setTimeout(connect, 5000);
  };
}
connect();
</script>
</body>
</html>
