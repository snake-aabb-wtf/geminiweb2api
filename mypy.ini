[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_unused_configs = True
warn_redundant_casts = True
no_implicit_optional = True
# We've chosen pragmatic typing: annotations where they add value, but
# don't require exhaustive type-parametrisation of ``dict``/``list``/
# ``Queue`` across the codebase. Run ``mypy --strict`` locally on the
# pure-data modules if you want the full treatment.
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# Per-module relaxations (only applied when those files are included
# on the command line; they're no-ops for the default invocation but
# keep the rules discoverable):
#   - config_tool.py is a Tkinter GUI; the dynamic typing in tkinter
#     pulls a lot of false positives.
#   - tests/ are out of scope (CI runs ``pytest``, not mypy on tests).

[mypy-config_tool]
ignore_errors = True

[mypy-tests.test_*]
ignore_errors = True

[mypy-tests.conftest]
ignore_errors = True
